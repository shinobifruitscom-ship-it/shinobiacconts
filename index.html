<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Shinobi Accounts</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  overflow-x: hidden;
}

/* FUNDO DRAGÃO */
body::before {
  content: "";
  background: url('https://i.imgur.com/8Km9tLL.png') no-repeat center;
  background-size: 600px;
  opacity: 0.05;
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEADER */
header {
  background: rgba(0,0,0,0.8);
  padding: 20px;
  font-size: 28px;
  letter-spacing: 3px;
  border-bottom: 1px solid #300;
}

.logo {
  color: #ff2e2e;
  text-shadow: 0 0 10px red;
}

/* CONTEÚDO */
.container {
  padding: 80px 20px;
}

h1 {
  font-size: 48px;
  text-shadow: 0 0 15px red;
}

.subtitle {
  color: #aaa;
  margin-bottom: 40px;
}

/* CARD */
.card {
  background: rgba(20, 0, 0, 0.8);
  border: 1px solid #500;
  border-radius: 15px;
  padding: 40px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(255,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

/* BOTÃO */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  background: linear-gradient(45deg, #ff0000, #990000);
  color: white;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: linear-gradient(45deg, #ff4444, #cc0000);
  box-shadow: 0 0 15px red;
}

/* RODAPÉ */
footer {
  margin-top: 100px;
  padding: 20px;
  font-size: 14px;
  color: #777;
}

/* DETALHE SHINOBI (linha animada) */
.line {
  width: 200px;
  height: 2px;
  background: red;
  margin: 20px auto;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}
</style>
</head>

<body>

<header>
  <span class="logo">Shinobi</span> Accounts
</header>

<div class="container">
  <h1>影のマーケット</h1>
  <div class="line"></div>
  <p class="subtitle">Mercado secreto dos shinobi</p>

  <div class="card">
    <h2>🚧 Em construção</h2>
    <p>Nossos pergaminhos ainda estão sendo preparados...</p>
    <button class="btn">Acessar em breve</button>
  </div>
</div>

<footer>
  © 2026 Shinobi Accounts — Caminho das Sombras
</footer>

</body>
</html>
