<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- SEO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Shinobi Accounts - Mercado secreto de contas e serviços Blox Fruits">

<title>Shinobi Accounts</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND PROFISSIONAL */
body::before {
  content: "";
  background: url('https://i.imgur.com/8Km9tLL.png') no-repeat center;
  background-size: 700px;
  opacity: 0.06;
  filter: blur(1px);
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEADER */
header {
  background: rgba(0,0,0,0.85);
  padding: 20px;
  font-size: 28px;
  letter-spacing: 3px;
  border-bottom: 1px solid #300;
  backdrop-filter: blur(6px);
}

.logo {
  color: #ff2e2e;
  text-shadow: 0 0 10px red;
}

/* CONTAINER */
.container {
  padding: 80px 20px;
  text-align: center;
}

/* TÍTULO COM EFEITO */
h1 {
  font-size: 48px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 30px red; }
}

.subtitle {
  color: #aaa;
  margin-bottom: 40px;
}

/* CARD */
.card {
  background: rgba(20, 0, 0, 0.85);
  border: 1px solid #500;
  border-radius: 15px;
  padding: 40px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(255,0,0,0.2);
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(255,0,0,0.5);
}

/* BOTÃO PREMIUM */
.btn {
  display: block;
  margin: 25px auto;
  padding: 14px 30px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 10px;
  font-weight: bold;
  text-decoration: none;
  transition: all 0.3s ease;
  width: 240px;
  background: linear-gradient(45deg, #5865F2, #404eed);
  position: relative;
  overflow: hidden;
}

/* efeito brilho */
.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: 0.5s;
}

.btn:hover::after {
  left: 100%;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px #5865F2;
}

/* LINHA */
.line {
  width: 200px;
  height: 2px;
  background: red;
  margin: 20px auto;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}

/* FOOTER */
footer {
  margin-top: 100px;
  padding: 20px;
  font-size: 14px;
  color: #777;
}

/* RESPONSIVIDADE */
@media (max-width: 768px) {

  h1 {
    font-size: 28px;
  }

  .card {
    width: 90%;
    padding: 25px;
  }

}
</style>
</head>

<body>

<header>
  <span class="logo">Shinobi</span> Accounts
</header>

<div class="container">
  <h1>影のマーケット</h1>
  <div class="line"></div>
  <p class="subtitle">Mercado secreto dos shinobi</p>

  <div class="card">
    <h2>🔥 Loja Aberta</h2>
    <p>Contas, serviços e vantagens no Blox Fruits</p>

    <a href="https://discord.gg/9CXvuy84" target="_blank" rel="noopener noreferrer" class="btn">
      Entrar no Discord
    </a>

  </div>
</div>

<footer>
  © 2026 Shinobi Accounts — Caminho das Sombras
</footer>

</body>
</html>
